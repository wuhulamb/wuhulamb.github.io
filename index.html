    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fafafa;
            color: #333;
            display: flex;
            justify-content: center;

        .container {

            border-color: #ccc;
            transform: translateY(-1px);
