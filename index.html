<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wuhulamb</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9f6f0;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { text-align: center; }

            font-size: 2.5rem;

            letter-spacing: 0.02em;
        }
        .links { display: flex; flex-direction: column; gap: 0.8rem; align-items: center; }
        .links a {
            display: block;
            width: 300px;
            padding: 1rem 1.5rem;
            background: #fdfbf7;
            border: 1px solid #e8e0d0;
            border-radius: 8px;
            text-decoration: none;
            color: #4a4a4a;
            font-size: 1.05rem;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s;
        }
        .links a:hover {
            background: #f8f3e9;
            border-color: #dcd0bc;
        }
        </style>
